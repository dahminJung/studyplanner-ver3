<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn" onclick="window.location.href='index.html'" title="메인으로">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <span class="badge">MONTHLY</span>
        <span class="header-date" id="monthly-title">로딩 중...</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="prev-month-btn" title="이전 달">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <button class="icon-btn" id="today-btn" title="오늘로" style="font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color);">TODAY</button>
        <button class="icon-btn" id="next-month-btn" title="다음 달">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='weekly.html'" title="위클리 플래너">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='settings.html'" title="기본 설정">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="monthly-layout">

      <!-- 캘린더 영역 -->
      <main class="card monthly-calendar-card">
        <div class="monthly-day-headers">
          <div>MON</div>
          <div>TUE</div>
          <div>WED</div>
          <div>THU</div>
          <div>FRI</div>
          <div class="day-hdr-sat">SAT</div>
          <div class="day-hdr-sun">SUN</div>
        </div>
        <div class="monthly-grid" id="monthly-grid">
          <!-- JS로 렌더링 -->
        </div>
      </main>

      <!-- 사이드 영역 -->
      <aside class="monthly-side">
        <section class="card monthly-side-section">
          <div class="section-label">MONTHLY GOAL</div>
          <textarea id="monthly-goal" placeholder="이번 달 목표를 적어보세요."></textarea>
        </section>
        <section class="card monthly-side-section">
          <div class="section-label">NOTES</div>
          <textarea id="monthly-notes" placeholder="이번 달 메모를 자유롭게 적어보세요."></textarea>
        </section>
        <section class="card monthly-side-section">
          <div class="section-label">IMPORTANT DATES</div>
          <textarea id="monthly-important" placeholder="중요한 날짜나 일정을 기록하세요."></textarea>
        </section>
      </aside>

    </div>
  </div>
  <script type="module" src="/monthly.js"></script>
</body>
</html>

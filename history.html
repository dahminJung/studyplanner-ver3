<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner - 기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn" onclick="window.location.href='index.html'" title="오늘로 돌아가기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="badge">HISTORY</span>
        <span class="header-title">기록</span>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="history-filter-bar card">
      <button class="history-filter-btn active" data-filter="all">전체</button>
      <button class="history-filter-btn" data-filter="yesterday">어제</button>
      <button class="history-filter-btn" data-filter="thisweek">이번 주</button>
      <button class="history-filter-btn" data-filter="lastweek">지난 주</button>
    </div>

    <!-- History List -->
    <div id="history-list" class="history-list">
      <!-- Rendered by JS -->
    </div>

    <!-- Empty State -->
    <div id="history-empty" class="history-empty card" style="display: none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--border-color); margin-bottom: 1rem;">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      <p>아직 기록이 없습니다.</p>
      <p style="font-size: 0.85rem; margin-top: 0.25rem;">매일 대시보드를 사용하면 자동으로 저장돼요.</p>
    </div>
  </div>

  <script type="module" src="/history.js"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner - Modern Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn" onclick="window.location.href='index.html'" title="메인으로">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="badge">WEEKLY</span>
        <span class="header-date" id="weekly-date-range">3월 2일 ~ 9일</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='settings.html'" title="기본 설정">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="weekly-main card">
      <div class="section-header">
        <h3>WEEKLY TIME TABLE</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button id="edit-weekly-btn" class="primary-btn" style="background-color: var(--text-muted); padding: 0.4rem 0.8rem; font-size: 0.8rem;">변경하기</button>
          <button id="save-weekly-btn" class="primary-btn" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; display: none;">저장</button>
          <div class="color-picker-group" id="weekly-subject-picker-group" style="opacity: 0.5; pointer-events: none;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
      <div class="weekly-timeline-box">
        <div class="weekly-header-row">
          <span>H</span>
          <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
        </div>
        <div class="weekly-grid-body" id="weekly-grid-body">
          <!-- Rendered by JS -->
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/weekly.js"></script>
</body>
</html>

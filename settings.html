<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기본 설정 - Study Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <div class="header-left">
        <button class="icon-btn" onclick="window.location.href='index.html'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="header-title">기본 설정</span>
      </div>
    </header>

    <main class="settings-main card">
      <div class="section-header">
        <h3>과목 및 색상 관리</h3>
        <p class="section-desc">타임테이블에서 사용할 과목과 연한 색상을 지정하세요.</p>
      </div>

      <div class="subject-form">
        <input type="text" id="subject-name" placeholder="새로운 과목 이름 (예: 수학)" class="form-input">
        
        <div class="color-palette" id="color-palette">
          <!-- 연한 색상(파스텔톤) 및 추가 색상 팔레트 생성 -->
          <button class="palette-btn selected" style="background-color: #fca5a5;" data-color="#fca5a5"></button>
          <button class="palette-btn" style="background-color: #fdba74;" data-color="#fdba74"></button>
          <button class="palette-btn" style="background-color: #fde047;" data-color="#fde047"></button>
          <button class="palette-btn" style="background-color: #86efac;" data-color="#86efac"></button>
          <button class="palette-btn" style="background-color: #67e8f9;" data-color="#67e8f9"></button>
          <button class="palette-btn" style="background-color: #93c5fd;" data-color="#93c5fd"></button>
          <button class="palette-btn" style="background-color: #c4b5fd;" data-color="#c4b5fd"></button>
          <button class="palette-btn" style="background-color: #f9a8d4;" data-color="#f9a8d4"></button>
          <button class="palette-btn" style="background-color: #1e3a8a;" data-color="#1e3a8a" title="네이비"></button>
        </div>

        <button id="add-subject-btn" class="primary-btn">과목 추가</button>
      </div>

      <div class="subject-list-container">
        <h4>등록된 과목</h4>
        <ul id="subject-list" class="subject-list">
          <!-- JS로 동적 렌더링 -->
        </ul>
      </div>
    </main>

    <section class="card">
      <div class="section-header" style="margin-bottom: 1.5rem;">
        <div>
          <h3>자주 사용하는 Task</h3>
          <p class="section-desc">자주 추가하는 할 일을 등록해두면 메인 화면에서 빠르게 추가할 수 있습니다.</p>
        </div>
      </div>

      <div class="quick-task-form">
        <input type="text" id="quick-task-title" placeholder="할 일 이름 (예: 수학 문제집 풀기)" class="form-input">
        <textarea id="quick-task-detail" placeholder="자세한 내용 (선택사항) — 추가할 때 미리 채워집니다" class="form-input" rows="2" style="resize: vertical; font-family: inherit; font-size: 0.95rem;"></textarea>
        <div class="quick-task-form-row">
          <select id="quick-task-subject" class="task-select">
            <option value="" disabled selected>과목 선택</option>
          </select>
          <button id="add-quick-task-btn" class="primary-btn" style="padding: 0.5rem 1.25rem; white-space: nowrap;">추가</button>
        </div>
      </div>

      <div class="subject-list-container" style="margin-top: 1.5rem;">
        <h4>등록된 빠른 Task</h4>
        <ul id="quick-task-list" class="subject-list"></ul>
      </div>
    </section>
  </div>
    <!-- 알림 설정 -->
    <section class="card" id="notification-section">
      <div class="section-header" style="margin-bottom: 1.5rem;">
        <div>
          <h3>📱 아침 알림 설정</h3>
          <p class="section-desc">매일 오전 8시에 오늘의 스터디 플랜을 SMS로 받아보세요.</p>
        </div>
        <span class="notif-status-badge" id="notif-status-badge">미설정</span>
      </div>

      <div class="notif-form">
        <div class="notif-field">
          <label class="notif-label">Worker URL</label>
          <input type="url" id="notif-worker-url" class="form-input" placeholder="https://studyplanner-worker.YOUR_ID.workers.dev">
          <p class="section-desc" style="margin-top: 0.35rem;">Cloudflare Worker 배포 후 생성된 URL을 입력하세요.</p>
        </div>
        <div class="notif-field">
          <label class="notif-label">API Key</label>
          <input type="password" id="notif-api-key" class="form-input" placeholder="Worker에 설정한 API_KEY 값">
        </div>
        <div class="notif-field">
          <label class="notif-label">전화번호</label>
          <input type="tel" id="notif-phone" class="form-input" placeholder="01012345678 (- 없이)">
        </div>
        <div class="notif-btn-row">
          <button id="notif-test-btn" class="notif-secondary-btn">연결 테스트</button>
          <button id="notif-save-btn" class="primary-btn">저장 &amp; 활성화</button>
        </div>
        <p id="notif-msg" class="notif-msg" style="display:none;"></p>
      </div>

    </section>
  </div>
  <script type="module" src="/settings.js"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner - Modern Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header Section -->
    <header class="app-header">
      <div class="header-left">
        <span class="badge">DATE</span>
        <span class="header-date" id="current-date-display">로딩 중...</span>
      </div>
      <div class="header-right">
        <button class="dday-btn" onclick="window.location.href='monthly.html?mode=dday'" title="D-Day 설정">
          <span class="badge badge-accent">D-DAY</span>
          <span class="header-dday" id="dday-count">--</span>
          <span class="dday-label" id="dday-title">설정하기</span>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='monthly.html'" title="먼슬리 플래너">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="8" y1="14" x2="8" y2="14"></line><line x1="12" y1="14" x2="12" y2="14"></line><line x1="16" y1="14" x2="16" y2="14"></line>
          </svg>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='weekly.html'" title="위클리 플래너">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='history.html'" title="기록 보기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h18v4H3z"></path><path d="M3 10h18v4H3z"></path><path d="M3 17h12v4H3z"></path>
          </svg>
        </button>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='settings.html'" title="기본 설정">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Goal Section -->
    <section class="goal-container card">
      <div class="section-label">DAILY GOAL</div>
      <div class="goal-content">
        <input type="text" placeholder="오늘의 다짐을 적어보세요." value="오늘도 어제보다 나은 나를 위해!">
      </div>
    </section>

    <!-- Main Content -->
    <div class="main-layout">
      <!-- Left: Daily Timetable Dashboard -->
      <section class="timetable-container card">
        <div class="section-header">
          <h3>TODAY'S TIME TABLE</h3>
          <div class="color-picker-group" id="subject-picker-group" style="pointer-events: none;">
            <!-- Rendered by JS as Legend -->
          </div>
        </div>
        <div class="weekly-timeline-box">
          <div class="weekly-header-row" id="daily-header-row" style="grid-template-columns: 40px 1fr;">
            <span>H</span>
            <span id="today-header-name">TODAY</span>
          </div>
          <div class="weekly-grid-body" id="daily-grid-body" style="grid-template-columns: 40px 1fr;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

      <!-- Right: To-Do List -->
      <section class="tasks-container card">
        <div class="section-header">
          <h3>TASKS</h3>
          <span class="task-count">0 / 0</span>
        </div>
        <form id="task-form" class="task-form">
          <input type="text" id="new-task-title" placeholder="새로운 할 일을 입력하세요" required class="task-input-field">
          <div class="task-form-row">
            <select id="new-task-subject" required class="task-select">
              <option value="" disabled selected>과목 선택</option>
              <!-- Rendered by JS -->
            </select>
            <button type="submit" class="primary-btn add-btn">추가</button>
          </div>
        </form>
        <div id="quick-tasks-row" class="quick-tasks-row"></div>
        <div class="task-items" id="task-list">
          <!-- Rendered by JS -->
        </div>
      </section>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <section class="memo card">
        <div class="section-label">MEMO</div>
        <textarea id="daily-memo" placeholder="메모를 자유롭게 남겨보세요."></textarea>
      </section>
      <section class="reflection card">
        <div class="section-label">DAILY REFLECTION</div>
        <textarea id="daily-reflection" placeholder="오늘 하루는 어땠나요? 자신에게 피드백을 남겨보세요."></textarea>
      </section>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner - Modern Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header Section -->
    <header class="app-header">
      <div class="header-left">
        <span class="badge">DATE</span>
        <span class="header-date">2026. 03. 03. 화요일</span>
      </div>
      <div class="header-right">
        <span class="badge badge-accent">D-DAY</span>
        <span class="header-dday">100</span>
        <button class="icon-btn" style="margin-left: 0.5rem;" onclick="window.location.href='settings.html'" title="기본 설정">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Goal Section -->
    <section class="goal-container card">
      <div class="section-label">DAILY GOAL</div>
      <div class="goal-content">
        <input type="text" placeholder="오늘의 다짐을 적어보세요." value="오늘도 어제보다 나은 나를 위해!">
      </div>
    </section>

    <!-- Main Content -->
    <div class="main-layout">
      <!-- Left: To-Do List -->
      <section class="tasks-container card">
        <div class="section-header">
          <h3>TASKS</h3>
          <span class="task-count">0 / 12</span>
        </div>
        <div class="task-items" id="task-list">
          <!-- Static items generated by JS or added here -->
          ${Array.from({length: 12}, (_, i) => `
            <div class="task-item">
              <input type="checkbox" class="task-checkbox">
              <input type="text" class="task-input" placeholder="할 일을 입력하세요.">
            </div>
          `).join('')}
        </div>
      </section>

      <!-- Right: Timetable -->
      <section class="timetable-container card">
        <div class="section-header">
          <h3>TIME TABLE</h3>
          <div class="color-picker-group" id="subject-picker-group">
            <!-- Rendered by JS -->
          </div>
        </div>
        <div class="timeline-box">
          <div class="timeline-header">
            <span>H</span>
            <span>10</span><span>20</span><span>30</span><span>40</span><span>50</span>
          </div>
          <div class="timeline-grid" id="timeline-grid">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <section class="total-time card">
        <div class="section-label">TOTAL STUDY TIME</div>
        <div class="time-display">00:00:00</div>
      </section>
      <section class="reflection card">
        <div class="section-label">DAILY REFLECTION</div>
        <textarea placeholder="오늘 하루는 어땠나요? 자신에게 피드백을 남겨보세요."></textarea>
      </section>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>

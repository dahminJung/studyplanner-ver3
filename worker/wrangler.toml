name = "studyplanner-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cloudflare KV 바인딩
# 배포 전: wrangler kv:namespace create "KV" 실행 후 id 붙여넣기
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# 매일 23:00 UTC = 한국 시간 08:00 KST
[triggers]
crons = ["0 23 * * *"]

# 시크릿 등록 명령어 (터미널에서 실행):
# wrangler secret put API_KEY           ← 앱 설정에서 사용할 임의 키
# wrangler secret put SOLAPI_API_KEY    ← console.solapi.com → API Key 관리
# wrangler secret put SOLAPI_API_SECRET ← 위와 동일한 화면
# wrangler secret put SOLAPI_FROM       ← 등록된 발신번호 (예: 01012345678)
